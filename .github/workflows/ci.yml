# =============================================================================
# finance-copilot — ci.yml
# GitHub Actions workflow for Continuous Integration.
# Runs on every push and pull request to the main/dev branches.
# =============================================================================

name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:

  # --- Quality & Test Job ----------------------------------------------------
  quality-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: make lint

      - name: Type check with mypy
        run: make typecheck

      - name: Run tests with pytest
        run: make test

  # --- Docker Build Job (Verify buildability) --------------------------------
  docker-build-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: actions/setup-python@v5 # Just for grouping, not used for build

      - name: Build backend image
        run: |
          docker compose build backend
