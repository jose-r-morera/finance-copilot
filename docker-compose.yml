# =============================================================================
# finance-copilot — docker-compose.yml
# Orchestrates all services for local development.
# Usage: `docker compose up --build -d`
# =============================================================================

version: "3.11"

services:

  # ---------------------------------------------------------------------------
  # backend — FastAPI application serving the REST API and running AI agents
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development         # use the dev stage for hot-reload
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend    # mount source for hot-reload
      - ./data:/app/data          # mount local data directory
    environment:
      - APP_ENV=${APP_ENV:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - POSTGRES_HOST=db
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-finance_copilot}
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PRIMARY_LLM_PROVIDER=${PRIMARY_LLM_PROVIDER:-openai}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY}
      - FMP_API_KEY=${FMP_API_KEY}
      - SEC_EDGAR_USER_AGENT=${SEC_EDGAR_USER_AGENT}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_HOST=${LANGFUSE_HOST:-https://cloud.langfuse.com}
      - DATA_DIR=/app/data
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # redis — in-memory store for caching API responses and agent state
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    ports:
      - "6380:6379"             # expose on 6380 to avoid local conflicts
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # db — PostgreSQL relational database for structured company data
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-finance_copilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-finance_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # frontend — Next.js app
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development         # use the dev stage for hot-reload
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app           # mount source for hot-reload
      - /app/node_modules         # anonymous volume for node_modules
      - /app/.next                # anonymous volume for Next.js build cache
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
